<div class="auth-screen">
  <div class="auth-card card">
    <div class="auth-brand">
      <span class="auth-sello">EA</span>
      <h1>EduApoyos</h1>
      <p class="auth-tagline">Gestión de becas, créditos y subsidios</p>
    </div>

    <form [formGroup]="formulario" (ngSubmit)="enviar()" class="stack" novalidate>
      <div class="field">
        <label for="email">Correo institucional</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          [class.invalid]="email.invalid && email.touched"
          placeholder="nombre@institucion.edu.co"
          autocomplete="email"
        />
        @if (email.invalid && email.touched) {
          <span class="field-error">Ingrese un correo válido.</span>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          [class.invalid]="password.invalid && password.touched"
          autocomplete="current-password"
        />
        @if (password.invalid && password.touched) {
          <span class="field-error">La contraseña es obligatoria.</span>
        }
      </div>

      @if (errorGeneral()) {
        <p class="auth-error">{{ errorGeneral() }}</p>
      }

      <button type="submit" class="btn btn-primary btn-block" [disabled]="cargando()">
        @if (cargando()) {
          <app-spinner [inline]="true" etiqueta="Ingresando…" />
        } @else {
          Ingresar
        }
      </button>
    </form>

    <p class="auth-footer">
      ¿No tiene cuenta? <a routerLink="/registro">Regístrese aquí</a>
    </p>
  </div>
</div>
